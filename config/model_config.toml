[inner]
version = "1.8.2"

# 配置文件版本号迭代规则同bot_config.toml

# ============================================================
# 环境变量说明
# ============================================================
# 本配置文件支持使用环境变量引用 API Keys，格式为 ${ENV_VAR_NAME}
#
# 优点：
# 1. 提高安全性：敏感信息不会被提交到版本控制系统
# 2. 便于管理：统一在 .env 文件中管理所有 API Keys
# 3. 灵活部署：不同环境可使用不同的环境变量配置
#
# 使用方法：
# 1. 在项目根目录的 .env 文件中设置环境变量
# 2. 在本配置文件中使用 ${变量名} 引用
# 3. 程序启动时会自动从 .env 文件读取并替换
#
# 示例：
#   .env 文件中: SILICONFLOW_API_KEY=sk-xxx
#   本文件中:   api_key = "${SILICONFLOW_API_KEY}"
# ============================================================

# ============================================================
# API 服务提供商配置
# ============================================================
# 说明：可以配置多个 API 提供商，每个提供商可以提供多个模型

[[api_providers]]
name = "DeepSeek"
base_url = "https://api.deepseek.com/v1"
api_key = "${DEEPSEEK_API_KEY}"  # 从环境变量读取，请在 .env 文件中设置
client_type = "openai"
max_retry = 1
timeout = 180
retry_interval = 5

[[api_providers]]
name = "BaiLian"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key = "${BAILIAN_API_KEY}"  # 从环境变量读取，请在 .env 文件中设置
client_type = "openai"
max_retry = 2
timeout = 120
retry_interval = 5

[[api_providers]]
name = "Google"
base_url = "https://generativelanguage.googleapis.com/v1beta"
api_key = "${GOOGLE_API_KEY}"  # 从环境变量读取，请在 .env 文件中设置
client_type = "gemini"
max_retry = 2
timeout = 120
retry_interval = 10

[[api_providers]]
name = "SiliconFlow"
base_url = "https://api.siliconflow.cn/v1"
api_key = "${SILICONFLOW_API_KEY}"  # 从环境变量读取，请在 .env 文件中设置
client_type = "openai"
max_retry = 1  # 减少重试次数，失败后更快切换
timeout = 240  # 增加超时时间到 240 秒，避免黑话推理等长时间任务超时
retry_interval = 5  # 减少重试间隔

# ============================================================
# 模型配置
# ============================================================
# 说明：定义可用的模型及其参数
[[models]]
model_identifier = "deepseek-chat"
name = "deepseek-v3"
api_provider = "DeepSeek"
price_in = 2
price_out = 8

[[models]]
model_identifier = "deepseek-chat"
name = "deepseek-v3-think"
api_provider = "DeepSeek"
price_in = 2
price_out = 8

[models.extra_params]
enable_thinking = true

[[models]]
model_identifier = "deepseek-ai/DeepSeek-V3.2-Exp"
name = "siliconflow-deepseek-v3.2"
api_provider = "SiliconFlow"
price_in = 2
price_out = 3
force_stream_mode = true  # 启用流式输出，加快首字响应速度

[models.extra_params]
enable_thinking = false

[[models]]
model_identifier = "deepseek-ai/DeepSeek-V3.2-Exp"
name = "siliconflow-deepseek-v3.2-think"
api_provider = "SiliconFlow"
price_in = 2
price_out = 3
force_stream_mode = true  # 启用流式输出，加快首字响应速度

[models.extra_params]
enable_thinking = true

[[models]]
model_identifier = "Qwen/Qwen3-Next-80B-A3B-Instruct"
name = "qwen3-next-80b"
api_provider = "SiliconFlow"
price_in = 1
price_out = 4

[[models]]
model_identifier = "zai-org/GLM-4.6"
name = "siliconflow-glm-4.6"
api_provider = "SiliconFlow"
price_in = 3.5
price_out = 14

[models.extra_params]
enable_thinking = false

[[models]]
model_identifier = "zai-org/GLM-4.6"
name = "siliconflow-glm-4.6-think"
api_provider = "SiliconFlow"
price_in = 3.5
price_out = 14

[models.extra_params]
enable_thinking = true

[[models]]
model_identifier = "deepseek-ai/DeepSeek-R1"
name = "siliconflow-deepseek-r1"
api_provider = "SiliconFlow"
price_in = 4
price_out = 16

[[models]]
model_identifier = "Qwen/Qwen3-30B-A3B-Instruct-2507"
name = "qwen3-30b"
api_provider = "SiliconFlow"
price_in = 0.7
price_out = 2.8

[[models]]
model_identifier = "Qwen/Qwen3-VL-30B-A3B-Instruct"
name = "qwen3-vl-30"
api_provider = "SiliconFlow"
price_in = 4.13
price_out = 4.13

[[models]]
model_identifier = "Qwen/Qwen2.5-VL-72B-Instruct"
name = "qwen2.5-vl-72b"
api_provider = "SiliconFlow"
price_in = 4.13
price_out = 4.13

[[models]]
model_identifier = "Qwen/Qwen3-Omni-30B-A3B-Instruct"
name = "qwen3-omni-30b"
api_provider = "SiliconFlow"
price_in = 4.13
price_out = 4.13

[[models]]
model_identifier = "FunAudioLLM/SenseVoiceSmall"
name = "sensevoice-small"
api_provider = "SiliconFlow"
price_in = 0
price_out = 0

[[models]]
model_identifier = "BAAI/bge-m3"
name = "bge-m3"
api_provider = "SiliconFlow"
price_in = 0
price_out = 0
[model_task_config.utils] # 在麦麦的一些组件中使用的模型，例如表情包模块，取名模块，关系模块，麦麦的情绪变化等，是麦麦必须的模型
model_list = ["siliconflow-deepseek-v3.2"] # 使用 SiliconFlow
temperature = 0.2                        # 模型温度，新V3建议0.1-0.3
max_tokens = 8192                         # 最大输出token数（已翻倍）
slow_threshold = 15                     # 慢请求阈值（秒），模型等待回复时间超过此值会输出警告日志

[model_task_config.utils_small] # 在麦麦的一些组件中使用的小模型，消耗量较大，建议使用速度较快的小模型
model_list = [
    "qwen3-30b",
    "qwen3-next-80b",
]
temperature = 0.7
max_tokens = 8192  # 已翻倍
slow_threshold = 10

[model_task_config.tool_use] #工具调用模型，需要使用支持工具调用的模型
model_list = [
    "qwen3-30b",
    "qwen3-next-80b",
]
temperature = 0.7
max_tokens = 3200  # 已翻倍
slow_threshold = 10

[model_task_config.replyer] # 首要回复模型，还用于表达器和表达方式学习
model_list = [
    "siliconflow-deepseek-v3.2",
    "siliconflow-deepseek-v3.2-think",
] # 使用 SiliconFlow
temperature = 0.3                        # 模型温度，新V3建议0.1-0.3
max_tokens = 8192  # 已翻倍
slow_threshold = 25

[model_task_config.planner] #决策：负责决定麦麦该什么时候回复的模型
model_list = ["siliconflow-deepseek-v3.2"] # 使用 SiliconFlow
temperature = 0.3
max_tokens = 3200  # 已翻倍
slow_threshold = 12

[model_task_config.vlm] # 图像识别模型
model_list = ["qwen3-vl-30", "qwen2.5-vl-72b"]  # Qwen3-VL-30B 主力，Qwen2.5-VL-72B 备选
max_tokens = 1024  # 已翻倍
slow_threshold = 20  # 增加慢速阈值，避免频繁警告

[model_task_config.voice] # 语音识别模型（语音转文字）
model_list = ["sensevoice-small"]
slow_threshold = 12

[model_task_config.video] # 视频理解模型
model_list = ["qwen3-omni-30b", "qwen2.5-vl-72b"]  # Qwen3-Omni 主力，Qwen2.5-VL-72B 备选
max_tokens = 2048
slow_threshold = 30  # 视频处理较慢，设置更长的阈值

[model_task_config.audio_understanding] # 音频理解模型（音频内容分析）
model_list = ["qwen3-omni-30b", "qwen2.5-vl-72b"]  # Qwen3-Omni 主力，Qwen2.5-VL-72B 备选
max_tokens = 1024
slow_threshold = 20

# 嵌入模型

[model_task_config.embedding]
model_list = ["bge-m3"]
slow_threshold = 5

# ------------LPMM知识库模型------------

[model_task_config.lpmm_entity_extract] # 实体提取模型
model_list = ["siliconflow-deepseek-v3.2"] # 使用 SiliconFlow
temperature = 0.2
max_tokens = 1600  # 已翻倍
slow_threshold = 20

[model_task_config.lpmm_rdf_build] # RDF构建模型
model_list = ["siliconflow-deepseek-v3.2"] # 使用 SiliconFlow
temperature = 0.2
max_tokens = 1600  # 已翻倍
slow_threshold = 20

[model_task_config.lpmm_qa] # 问答模型
model_list = ["siliconflow-deepseek-v3.2"] # 使用 SiliconFlow
temperature = 0.7
max_tokens = 1600  # 已翻倍
slow_threshold = 20
