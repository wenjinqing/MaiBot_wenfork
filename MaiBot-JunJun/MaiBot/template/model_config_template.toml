[inner]
version = "1.8.3"

# 配置文件版本号迭代规则同bot_config.toml
# model_identifier 已与 SiliconFlow 等代金券开放列表对齐（勿填套餐外名称如 DeepSeek-V3.2-Exp）

[[api_providers]] # API服务提供商（可以配置多个）
name = "DeepSeek"                       # API服务商名称（可随意命名，在models的api-provider中需使用这个命名）
base_url = "https://api.deepseek.com/v1" # API服务商的BaseURL
api_key = "${DEEPSEEK_API_KEY}"         # API密钥（从环境变量读取，请在 .env 文件中设置）
client_type = "openai"                  # 请求客户端（可选，默认值为"openai"，使用gimini等Google系模型时请配置为"gemini"）
max_retry = 2                           # 最大重试次数（单个模型API调用失败，最多重试的次数）
timeout = 120                            # API请求超时时间（单位：秒）
retry_interval = 10                     # 重试间隔时间（单位：秒）

[[api_providers]] # 阿里 百炼 API服务商配置
name = "BaiLian"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key = "${BAILIAN_API_KEY}"          # API密钥（从环境变量读取，请在 .env 文件中设置）
client_type = "openai"
max_retry = 2
timeout = 120
retry_interval = 5

[[api_providers]] # 特殊：Google的Gimini使用特殊API，与OpenAI格式不兼容，需要配置client为"gemini"
name = "Google"
base_url = "https://generativelanguage.googleapis.com/v1beta"
api_key = "${GOOGLE_API_KEY}"           # API密钥（从环境变量读取，请在 .env 文件中设置）
client_type = "gemini"
max_retry = 2
timeout = 120
retry_interval = 10

[[api_providers]] # SiliconFlow的API服务商配置
name = "SiliconFlow"
base_url = "https://api.siliconflow.cn/v1"
api_key = "${SILICONFLOW_API_KEY}"      # API密钥（从环境变量读取，请在 .env 文件中设置）
client_type = "openai"
max_retry = 3
timeout = 180                           # HTTP 请求超时（秒）；识图/VLM 较慢时可与 vlm 任务配合加大
retry_interval = 5


# 任务 model_list 中的 name 均须在下方 [[models]] 定义
[[models]]
model_identifier = "deepseek-ai/DeepSeek-V3.2"
name = "siliconflow-deepseek-v3.2"
api_provider = "SiliconFlow"
price_in = 2.0
price_out = 3.0
[models.extra_params] # 可选的额外参数配置
enable_thinking = false # 不启用思考
# temperature = 0.5    # 可选：为该模型单独指定温度，会覆盖任务配置中的温度

[[models]]
model_identifier = "deepseek-ai/DeepSeek-V3.2"
name = "siliconflow-deepseek-v3.2-think"
api_provider = "SiliconFlow"    
price_in = 2.0
price_out = 3.0
[models.extra_params] # 可选的额外参数配置
enable_thinking = true # 启用思考
# temperature = 0.7    # 可选：为该模型单独指定温度，会覆盖任务配置中的温度

[[models]]
model_identifier = "zai-org/GLM-4.6"
name = "siliconflow-glm-4.6"
api_provider = "SiliconFlow"    
price_in = 3.5
price_out = 14.0
[models.extra_params] # 可选的额外参数配置
enable_thinking = false # 不启用思考

[[models]]
model_identifier = "zai-org/GLM-4.6"
name = "siliconflow-glm-4.6-think"
api_provider = "SiliconFlow"    
price_in = 3.5
price_out = 14.0
[models.extra_params] # 可选的额外参数配置
enable_thinking = true # 启用思考

[[models]]
model_identifier = "deepseek-ai/DeepSeek-R1"
name = "siliconflow-deepseek-r1"
api_provider = "SiliconFlow"
price_in = 4.0
price_out = 16.0


[[models]]
model_identifier = "Qwen/Qwen3-30B-A3B-Instruct-2507"
name = "qwen3-30b"
api_provider = "SiliconFlow"
price_in = 0.7
price_out = 2.8

[[models]]
model_identifier = "Qwen/Qwen3-VL-30B-A3B-Instruct"
name = "qwen3-vl-30"
api_provider = "SiliconFlow"
price_in = 4.13
price_out = 4.13

[[models]]
model_identifier = "FunAudioLLM/SenseVoiceSmall"
name = "sensevoice-small"
api_provider = "SiliconFlow"
price_in = 0
price_out = 0

[[models]]
model_identifier = "BAAI/bge-m3"
name = "bge-m3"
api_provider = "SiliconFlow"
price_in = 0
price_out = 0

[[models]]
model_identifier = "deepseek-ai/DeepSeek-V3"
name = "siliconflow-deepseek-v3"
api_provider = "SiliconFlow"
price_in = 2.0
price_out = 3.0

[[models]]
model_identifier = "moonshotai/Kimi-K2-Instruct-0905"
name = "siliconflow-kimi-k2"
api_provider = "SiliconFlow"
price_in = 1.0
price_out = 1.0

[[models]]
model_identifier = "Qwen/Qwen3-32B"
name = "qwen3-32b"
api_provider = "SiliconFlow"
price_in = 1.0
price_out = 1.0


[model_task_config.utils] # 在麦麦的一些组件中使用的模型，例如表情包模块，取名模块，关系模块，麦麦的情绪变化等，是麦麦必须的模型
model_list = ["siliconflow-deepseek-v3.2"] # 使用的模型列表，每个子项对应上面的模型名称(name)
temperature = 0.2                        # 模型温度，新V3建议0.1-0.3
max_tokens = 8192                         # 最大输出token数
slow_threshold = 15.0                     # 慢请求阈值（秒），模型等待回复时间超过此值会输出警告日志

[model_task_config.utils_small] # 在麦麦的一些组件中使用的小模型，消耗量较大，建议使用速度较快的小模型
model_list = ["qwen3-30b","qwen3-32b"]
temperature = 0.7
max_tokens = 8192
slow_threshold = 10.0

[model_task_config.tool_use] # v2 决策轮（有工具时）：与 replyer 同系模型可减少「助手味」；须支持工具调用
model_list = ["siliconflow-deepseek-v3.2","siliconflow-deepseek-v3.2-think","siliconflow-glm-4.6","siliconflow-glm-4.6-think","siliconflow-deepseek-v3","siliconflow-kimi-k2","qwen3-32b"]
temperature = 0.3
max_tokens = 8192
slow_threshold = 25.0

[model_task_config.replyer] # 首要回复模型，还用于表达器和表达方式学习
model_list = ["siliconflow-deepseek-v3.2","siliconflow-deepseek-v3.2-think","siliconflow-glm-4.6","siliconflow-glm-4.6-think","siliconflow-deepseek-v3","siliconflow-kimi-k2","qwen3-32b"]
temperature = 0.3                        # 模型温度，新V3建议0.1-0.3
max_tokens = 8192
slow_threshold = 25.0

[model_task_config.planner] #决策：负责决定麦麦该什么时候回复的模型
model_list = ["siliconflow-deepseek-v3.2"]
temperature = 0.3
max_tokens = 4096
slow_threshold = 12.0

[model_task_config.vlm] # 图像识别模型（表情包/图片理解等，走 generate_response_for_image）
model_list = ["qwen3-vl-30"]
max_tokens = 4096                       # 过小易触发「仅输出部分内容」警告；可按供应商上限再调
slow_threshold = 90.0                   # 仅慢请求告警阈值（秒），不影响真实 HTTP 超时（见 SiliconFlow timeout）

[model_task_config.voice] # 语音识别模型
model_list = ["sensevoice-small"]
max_tokens = 4096
slow_threshold = 12.0

# 嵌入模型
[model_task_config.embedding]
model_list = ["bge-m3"]
slow_threshold = 5.0

# ------------LPMM知识库模型------------

[model_task_config.lpmm_entity_extract] # 实体提取模型
model_list = ["siliconflow-deepseek-v3.2"]
temperature = 0.2
max_tokens = 4096
slow_threshold = 20.0

[model_task_config.lpmm_rdf_build] # RDF构建模型
model_list = ["siliconflow-deepseek-v3.2"]
temperature = 0.2
max_tokens = 4096
slow_threshold = 20.0

[model_task_config.lpmm_qa] # 问答模型
model_list = ["siliconflow-deepseek-v3.2"]
temperature = 0.7
max_tokens = 4096
slow_threshold = 20.0

# 今日运势插件（mod/jrys_prpr_maimbot）占卜文案，独立调用；建议 DeepSeek
[model_task_config.jrys_fortune]
model_list = ["siliconflow-deepseek-v3.2"]
temperature = 0.85
max_tokens = 512
slow_threshold = 25.0
