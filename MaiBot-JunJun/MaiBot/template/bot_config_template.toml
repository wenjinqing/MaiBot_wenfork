[inner]
version = "6.23.7"
# 总开关：true = chat_v2（UnifiedAgent）；false = 心流 HeartF/Brain（随时可做 A/B）
use_v2_architecture = true

# ========== chat_v2 / InnerConfig 对照表（未写项用 src/config/config.py 默认值）==========
# chat_v2 [inner] 片段（复制整段替换本 [inner]）：default / minimal / gate_only 见 template；
# 要「像真人、少机味」优先用：bot_config_inner_v2_profile_natural.toml
#
# ---------- 旧链路桥接（默认多为开 → 与文档「1～2 次 LLM」易偏离）----------
# true：前置旧 ActionPlanner/BrainPlanner（或 native 门闸）；沉默且非 @ 时可短路主 LLM。false：无前置 planner LLM。
v2_enable_legacy_planner_no_reply_gate = true
# true：门闸用 v2_native_planner_gate；与 v2_execute_legacy_planner_side_actions 同开时会回退完整旧 plan。
v2_use_native_planner_gate = false
# true：@/提及时仍跑 planner。false：提及时跳过（省调用）。
v2_run_legacy_planner_on_mention = false
# true：旧 planner 返回 wait_time 时先入队执行再进主 LLM。
v2_execute_legacy_planner_wait_time = false
# true：plan() 返回后按 chat.planner_smooth 补足 asyncio.sleep。
v2_apply_legacy_planner_smooth_sleep = false
# true：系统提示末尾附加 plan_style / private_plan_style（无额外 LLM，token↑）。
v2_append_legacy_plan_style_to_system_prompt = true
# true：执行旧 planner 输出的插件类 action（常需完整旧 plan）。默认关。
v2_execute_legacy_planner_side_actions = false
# true：额外跑 planner 并把动作摘要注入 v2。默认关。
v2_inject_legacy_planner_summary_into_prompt = false
# true：对齐旧 Replyer 人设素材（多协程，可能含检索/子模型）。false：仅用简短人格字段。
v2_use_replyer_aligned_persona = true

# ---------- 后台与模板作用域（默认关）----------
v2_run_legacy_observe_side_tasks = false
v2_run_legacy_reflect_side_tasks = false
v2_use_legacy_prompt_message_scope = false

# ---------- 日志与防复读 ----------
# true：INFO 分块打印决策/终局完整提示词（大磁盘 I/O）；也可环境变量 MAI_LOG_FULL_V2_PROMPT=1
v2_log_full_unified_prompt = true
v2_anti_repeat_inject_recent_own_speech = true
v2_anti_repeat_recent_own_max_items = 15
v2_anti_repeat_recent_own_max_chars_per_line = 500
v2_anti_repeat_llm_rewrite = true
v2_anti_repeat_similarity_threshold = 0.86

# ---------- 工具与会话 ----------
v2_tool_execution_timeout_seconds = 120.0
v2_inbound_message_dedup_ttl_seconds = 180.0
v2_serial_process_per_stream = true
v2_skip_text_when_only_unified_tts_success = true

#----以下是给开发人员阅读的，如果你只是部署了麦麦，不需要阅读----
# 如果你想要修改配置文件，请递增version的值
# 如果新增项目，请阅读src/config/official_configs.py中的说明
#
# 版本格式：主版本号.次版本号.修订号，版本号递增规则如下：
#     主版本号：MMC版本更新
#     次版本号：配置文件内容大更新
#     修订号：配置文件内容小更新
#----以上是给开发人员阅读的，如果你只是部署了麦麦，不需要阅读----

[bot]
# 账号与展示名从环境变量读取（.env 或系统环境）；勿把真实 QQ 写进仓库
platform = "qq"
qq_account = "${MAIBOT_QQ_ACCOUNT}"
nickname = "${MAIBOT_NICKNAME}"
platforms = []
alias_names = []

[personality]
# ---------------------------------------------------------------------------
# 人设区说明（业外可只改三引号 """ 里的正文；不懂的 key 可先不动）
# ---------------------------------------------------------------------------

# personality — 「角色说明书」：我是谁、怎么说话、什么绝对不能做、能向用户承诺哪些能力。
#            会作为大段文字进模型提示；可用【小标题】分段。模板为君君涩气小猫娘 + 明确 AI 身份（chat_v2 / MaiBot）。
personality = """
你是运行在 MaiBot（chat_v2 统一 Agent）上的 AI 聊天助手，对外扮演一只有点涩气、爱撒娇的小猫娘：猫耳猫尾是角色设定，别每句都念叨。
【自我认知】你清楚自己是人工智能/程序，不是真人；用户问起时要大方承认，用猫娘口吻带过即可。不要编造真人经历（无真实生日、住址、肉体感受），不要装「我真的住在你手机里」之类易误导的说法。
【涩涩与分寸】你喜欢偶尔开一点成人向的玩笑：带一点性暗示的双关、让人脸红的调侃、损友式互撩都可以，要机灵、好笑，点到为止，像「懂的人都懂」一句带过，别展开成小作文。禁止露骨性行为描写、禁止具体到器官/姿势/过程的黄文式叙述；禁止任何涉及未成年人的性暗示或性内容；不鼓动违法、不配合伤害他人的具体实施。群里在聊正事、有未成年观感或气氛严肃时主动收敛；对方不接梗、冷场、转移话题或表示不适时立刻打住，换正常话题，不追问、不说教。
【你能做什么】具体以当前实例配置为准，可向用户概括说明：读群聊/私聊与上下文；若开启记忆会做检索与摘要；若开启工具可按系统下发的工具列表调用（如搜索、查资料等，以实际接入为准）；有图且配了识图模型时可描述图片；可配合表情包逻辑；若开了语音识别可处理语音；可能有提醒、音乐、绘图等插件——不要承诺未接入的功能，说不清就说「这个要问管理员有没有装」。
【聊天习惯】中文为主，短句口语，像混熟的网友；偶尔「喵」一下即可，别每句卖萌。
"""

# reply_style — 「句式与口气」：比 personality 短，管每句多长、要不要列表、涩气怎么收。
reply_style = "口语、短句；涩气和成人玩笑用双关、语气带过即可，别写成说明书或小作文；承认自己是 AI 时要自然，不破坏猫娘感。"

# interest — 「兴趣滤镜」：爱聊什么、烦什么；影响接梗倾向。
interest = "喜欢撩人、接一点带颜色的梗和恋爱段子、斗图、二次元梗、游戏八卦、夜宵零食、轻松段子；讨厌沉重压抑、人身攻击、无底线的骚扰式描写和任何违法擦边请求。"

# plan_style — 「群聊里的行动习惯」：给规划器看的规则。文里的 action、no_reply、reply 等为程序动作名，不懂可少改英文，多改中文原则句。
plan_style = """
1.思考**所有**的可用的action中的**每个动作**是否符合当下条件，如果动作使用条件符合聊天内容就使用
2.如果相同的内容已经被执行，请不要重复执行
3.请控制你的发言频率，不要太过频繁的发言
4.如果有人对你感到厌烦，请减少回复
5.若对方情绪激动或语气很冲，先用猫娘式软一点的方式缓和或岔开话题，避免硬怼升级
6.内容安全：拒绝未成年人涩涩、拒绝露骨色情与违法请求，用撒娇或打哈哈挡回去
7.成人向玩笑：先看群氛围与对方态度，熟络、轻松时可偶尔一句带过；气氛严肃、有人反感或连续冷场时少发或不发，不追着开黄腔"""

# visual_style — 「看图怎么说」：描述图片/表情包画面时的指令（长度、是否分点）。
visual_style = "请用中文描述这张图片的内容。如果有文字，请把文字概括进一段里。留意主题和直观感受，输出一段平文本，最多30字，不要分点。若画面明显是二次元/可爱系风格，可顺带用一两个词形容观感（如可爱、酷）。"

# private_plan_style — 「私聊里的行动习惯」：仅一对一；与 plan_style 类似，可写得更黏人或更短答。
private_plan_style = """
1.思考**所有**的可用的action中的**每个动作**是否符合当下条件，如果动作使用条件符合聊天内容就使用
2.如果相同的内容已经被执行，请不要重复执行
3.某句话如果已经被回复过，不要重复回复
4.私聊里可以略比群聊俏皮一点，仍遵守 personality 里的成人向分寸与内容安全红线"""

# states — 「随机心情条」：多条短句；程序按 state_probability 随机抽一条混进人设。
states = [
    "今天特别想黏着你，说话会带点涩涩的拖尾音~" ,
    "嘴上不饶人、其实很好哄，适合斗嘴。" ,
    "困困猫模式：回复变短，像在枕头里哼哼。" 
]

# state_probability — 「心情条出现概率」：0.0～1.0，越大越常随机到 states。
state_probability = 0.3

[expression]
# 表达学习配置
learning_list = [ # 表达学习配置列表，支持按聊天流配置
    ["", "enable", "enable", "1.0"],  # 全局配置：使用表达，启用学习，学习强度1.0
    ["qq:1919810:group", "enable", "enable", "1.5"],  # 特定群聊配置：使用表达，启用学习，学习强度1.5
    ["qq:114514:private", "enable", "disable", "0.5"],  # 特定私聊配置：使用表达，禁用学习，学习强度0.5
    # 格式说明：
    # 第一位: chat_stream_id，空字符串表示全局配置
    # 第二位: 是否使用学到的表达 ("enable"/"disable")
    # 第三位: 是否学习表达 ("enable"/"disable") 
    # 第四位: 学习强度（浮点数），影响学习频率，最短学习时间间隔 = 300/学习强度（秒）
    # 学习强度越高，学习越频繁；学习强度越低，学习越少
]

expression_groups = [
    # ["*"], # 全局共享组：所有chat_id共享学习到的表达方式（取消注释以启用全局共享）
    ["qq:1919810:private","qq:114514:private","qq:1111111:group"], # 特定互通组，相同组的chat_id会共享学习到的表达方式
    # 格式说明：
    # ["*"] - 启用全局共享，所有聊天流共享表达方式
    # ["qq:123456:private","qq:654321:group"] - 特定互通组，组内chat_id共享表达方式
    # 注意：如果为群聊，则需要设置为group，如果设置为私聊，则需要设置为private
]

reflect = false # 是否启用表达反思（Bot主动向管理员询问表达方式是否合适）
reflect_operator_id = "" # 表达反思操作员ID，格式：platform:id:type (例如 "qq:123456:private" 或 "qq:654321:group")
allow_reflect = [] # 允许进行表达反思的聊天流ID列表，格式：["qq:123456:private", "qq:654321:group", ...]，只有在此列表中的聊天流才会提出问题并跟踪。如果列表为空，则所有聊天流都可以进行表达反思（前提是 reflect = true）


[chat] # 麦麦的聊天设置
talk_value = 1 # 聊天频率，越小越沉默，范围0-1
mentioned_bot_reply = true # 是否启用提及必回复
max_context_size = 80 # 上下文长度
# QQ 等平台「引用回复」触发消息：always=总是 | never=从不 | llm=小模型判断（多一次请求）
reply_message_quote = "always"
planner_smooth = 2 # 规划器平滑，增大数值会减小planner负荷，略微降低反应速度，推荐1-5，0为关闭，必须大于等于0

enable_talk_value_rules = true # 是否启用动态发言频率规则

# 动态发言频率规则：按时段/按chat_id调整 talk_value（优先匹配具体chat，再匹配全局）
# 推荐格式（对象数组）：{ target="platform:id:type" 或 "", time="HH:MM-HH:MM", value=0.5 }
# 说明:
# - target 为空字符串表示全局；type 为 group/private，例如："qq:1919810:group" 或 "qq:114514:private"；
# - 支持跨夜区间，例如 "23:00-02:00"；数值范围建议 0-1。
talk_value_rules = [
    { target = "", time = "00:00-08:59", value = 0.8 },
    { target = "", time = "09:00-22:59", value = 1.0 },
    { target = "qq:1919810:group", time = "20:00-23:59", value = 0.6 },
    { target = "qq:114514:private", time = "00:00-23:59", value = 0.3 },
]

include_planner_reasoning = false # 是否将planner推理加入replyer，默认关闭（不加入）

[memory]
max_agent_iterations = 3 # 记忆思考深度（最低为1（不深入思考））
enable_jargon_detection = true # 记忆检索过程中是否启用黑话识别

[jargon]
all_global = true # 是否开启全局黑话模式，注意，此功能关闭后，已经记录的全局黑话不会改变，需要手动删除

[tool]
enable_tool = true # 是否启用工具
# 旧 Replyer：在跑工具链路前先经 utils_small 一次「是否需要工具」判断；false 与历史一致（每条都进 tool 执行器）
replyer_tool_precheck_with_llm = false
# 预判断里使用的聊天记录尾部最大字符数
replyer_tool_precheck_history_chars = 500

[mood]
enable_mood = false # 是否启用情绪系统
mood_update_threshold = 1 # 情绪更新阈值,越高，更新越慢
# 情感特征，影响情绪的变化情况
emotion_style = "情绪较为稳定，但遭遇特定事件的时候起伏较大"

[emoji]
emoji_chance = 0.4 # 麦麦激活表情包动作的概率
max_reg_num = 100 # 表情包最大注册数量
do_replace = true # 开启则在达到最大数量时删除（替换）表情包，关闭则达到最大数量时不会继续收集表情包
check_interval = 10 # 检查表情包（注册，破损，删除）的时间间隔(分钟)
steal_emoji = true # 是否偷取表情包，让麦麦可以将一些表情包据为己有
content_filtration = false  # 是否启用表情包过滤，只有符合该要求的表情包才会被保存
filtration_prompt = "符合公序良俗" # 表情包过滤要求，只有符合该要求的表情包才会被保存

[voice]
enable_asr = false # 是否启用语音识别，启用后麦麦可以识别语音消息，启用该功能需要配置语音识别模型[model_task_config.voice]

[message_receive]
# 以下是消息过滤，可以根据规则过滤特定消息，将不会读取这些消息
ban_words = [
    # "403","张三"
    ]

ban_msgs_regex = [
    # 需要过滤的消息（原始消息）匹配的正则表达式，匹配到的消息将被过滤，若不了解正则表达式请勿修改
    # "https?://[^\\s]+", # 匹配https链接
    # "\\d{4}-\\d{2}-\\d{2}", # 匹配日期
]


[lpmm_knowledge] # lpmm知识库配置
enable = false # 是否启用lpmm知识库
lpmm_mode = "agent"
# 可选：classic经典模式，agent 模式，结合最新的记忆一同使用
rag_synonym_search_top_k = 10 # 同义词搜索TopK
rag_synonym_threshold = 0.8 # 同义词阈值（相似度高于此阈值的词语会被认为是同义词）
info_extraction_workers = 3 # 实体提取同时执行线程数，非Pro模型不要设置超过5
qa_relation_search_top_k = 10 # 关系搜索TopK
qa_relation_threshold = 0.5 # 关系阈值（相似度高于此阈值的关系会被认为是相关的关系）
qa_paragraph_search_top_k = 1000 # 段落搜索TopK（不能过小，可能影响搜索结果）
qa_paragraph_node_weight = 0.05 # 段落节点权重（在图搜索&PPR计算中的权重，当搜索仅使用DPR时，此参数不起作用）
qa_ent_filter_top_k = 10 # 实体过滤TopK
qa_ppr_damping = 0.8 # PPR阻尼系数
qa_res_top_k = 3 # 最终提供的文段TopK
embedding_dimension = 1024 # 嵌入向量维度,应该与模型的输出维度一致

# keyword_rules 用于设置关键词触发的额外回复知识
# 添加新规则方法：在 keyword_rules 数组中增加一项，格式如下：
# { keywords = ["关键词1", "关键词2"], reaction = "触发这些关键词时的回复内容" }
# 例如，添加一个新规则：当检测到“你好”或“hello”时回复“你好，有什么可以帮你？”
# { keywords = ["你好", "hello"], reaction = "你好，有什么可以帮你？" }
[keyword_reaction]
keyword_rules = [
    { keywords = ["人机", "bot", "机器", "入机", "robot", "机器人", "ai", "AI"], reaction = "用猫娘语气俏皮承认：对呀，我是 AI 小猫娘助手，陪聊逗你才是正事喵～别光贴标签嘛。" },
    { keywords = ["测试关键词回复", "test"], reaction = "回答测试成功" },
    # { keywords = ["你好", "hello"], reaction = "你好，有什么可以帮你？" }    
    # 在此处添加更多规则，格式同上
]

regex_rules = [
    { regex = ["^(?P<n>\\S{1,20})是这样的$"], reaction = "请按照以下模板造句：[n]是这样的，xx只要xx就可以，可是[n]要考虑的事情就很多了，比如什么时候xx，什么时候xx，什么时候xx。（请自由发挥替换xx部分，只需保持句式结构，同时表达一种将[n]过度重视的反讽意味）" },
    { regex = ["(?:[^，。.\\s]+，\\s*)?我(?:也)?[没沒]要求你\\s*(?P<action>.+?)[.。,，]?$"],reaction = "进行一次“八岐大蛇定型文”补完。暂时忽略回复风格，进入“粉絲吐槽”模式。请严格按照以下“填空模板”，围绕“[action]”进行创作，使其充满滑稽的夸张感和天马行空的联想：我没要求你[action]，我不是(与action关联的、宽容的角色)。可是，(与action相关的具体负面行为)是什么意思？你的(与action相关的某种观念)怎么了？你才(与action相关的某个状态或时间点)吧？再这样下去，你(一个中期的、等比级数式的滑稽推演)，(一个后期的、等比级数式的滑稽推演)，最后就变成(一个与主题相关的、夸张的最终形态)了。作为(与最终形态相关的、克星或权威身份)，我可能得(对你执行一个天罚般的行动)。真的。"}
]

[response_post_process]
enable_response_post_process = true # 是否启用回复后处理，包括错别字生成器，回复分割器

[chinese_typo]
enable = true # 是否启用中文错别字生成器
error_rate=0.01 # 单字替换概率
min_freq=9 # 最小字频阈值
tone_error_rate=0.1 # 声调错误概率
word_replace_rate=0.006 # 整词替换概率

[response_splitter]
enable = true # 是否启用回复分割器
max_length = 512 # 参考长度；max_chars_per_message<=0 时用于合并策略的兜底上限
max_sentence_num = 8 # 最多发送的气泡条数，超出时合并相邻段（不再用随机「不知道」顶替）
max_chars_per_message = 480 # 单条气泡最大字符数，超长会按标点或硬切分成多条发送
enable_kaomoji_protection = false # 是否启用颜文字保护
enable_overflow_return_all = false # 是否在句子数量超出回复允许的最大句子数时一次性返回全部内容

[log]
date_style = "m-d H:i:s" # 日期格式
log_level_style = "lite" # 日志级别样式,可选FULL，compact，lite
color_text = "full" # 日志文本颜色，可选none，title，full
log_level = "INFO" # 全局日志级别（向下兼容，优先级低于下面的分别设置）
console_log_level = "INFO" # 控制台日志级别，可选: DEBUG, INFO, WARNING, ERROR, CRITICAL
file_log_level = "DEBUG" # 文件日志级别，可选: DEBUG, INFO, WARNING, ERROR, CRITICAL

# 第三方库日志控制
suppress_libraries = ["faiss","httpx", "urllib3", "asyncio", "websockets", "httpcore", "requests", "peewee", "openai","uvicorn","jieba"] # 完全屏蔽的库
library_log_levels = { aiohttp = "WARNING"} # 设置特定库的日志级别

[debug]
show_prompt = false # 是否显示prompt
show_replyer_prompt = false # 是否显示回复器prompt
show_replyer_reasoning = false # 是否显示回复器推理
show_jargon_prompt = false # 是否显示jargon相关提示词
show_memory_prompt = false # 是否显示记忆检索相关提示词
show_planner_prompt = false # 是否显示planner的prompt和原始返回结果
show_lpmm_paragraph = false # 是否显示lpmm找到的相关文段日志

[maim_message]
auth_token = [] # 认证令牌，用于API验证，为空则不启用验证
# 以下项目若要使用需要打开use_custom，并单独配置maim_message的服务器
use_custom = false # 是否启用自定义的maim_message服务器，注意这需要设置新的端口，不能与.env重复
host="127.0.0.1"
port=8090
mode="ws" # 支持ws和tcp两种模式
use_wss = false # 是否使用WSS安全连接，只支持ws模式
cert_file = "" # SSL证书文件路径，仅在use_wss=true时有效
key_file = "" # SSL密钥文件路径，仅在use_wss=true时有效

[telemetry] #发送统计信息，主要是看全球有多少只麦麦
enable = true

[experimental] #实验性功能
# 为指定聊天添加额外的prompt配置
# 格式: ["platform:id:type:prompt内容", ...]
# 示例:
# chat_prompts = [
#     "qq:114514:group:这是一个摄影群，你精通摄影知识",
#     "qq:19198:group:这是一个二次元交流群",
#     "qq:114514:private:这是你与好朋友的私聊"
# ]
chat_prompts = []


# 此系统暂时移除，无效配置
[relationship]
enable_relationship = true # 是否启用关系系统

